<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eventer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo-icon">E</div>
            
            <h2>Welcome Back</h2>
            <p>Log in to your account.</p>
            
            {% with messages = get_flashed_messages(category_filter=["error"]) %}
                {% if messages %}
                    <div class="alert-container" style="color: #ff4d4d; margin-bottom: 15px; font-size: 14px; text-align: center;">
                        {{ messages[-1] }}
                    </div>
                {% endif %}
            {% endwith %}
            
            <form action="/login" method="POST">
                <div class="input-group">
                    <label for="email">Student Email</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your student email">
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn-login">Log In</button>
            </form>
            
            <p class="switch-form">Don't have an account? <a href="/register">Sign Up</a></p>
        </div>
    </div>
</body>
</html>
