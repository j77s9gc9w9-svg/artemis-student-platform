<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eventer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo-icon">E</div>
            
            <h2>Welcome Back</h2>
            <p>Log in to your account.</p>
            
            <form action="{{ url_for('pages.login') }}" method="POST">
                <div class="input-group">
                    <label for="email">Student Email</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your student email">
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn-login">Log In</button>
            </form>
            
            <p class="switch-form">Don't have an account? <a href="{{ url_for('pages.register') }}">Sign Up</a></p>
        </div>
    </div>
</body>
</html>
