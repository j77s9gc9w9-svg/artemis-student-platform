<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Eventer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='register.css') }}">
</head>
<body>

    <div class="signup-container">
        <div class="signup-card">
            <div class="signup-logo-icon">E</div>
            
            <h2>Create Account</h2>
            <p>Join Eventer to discover campus events.</p>
            
            {% if error %}
                <div class="error-message" style="color: #ef4444; background: #fee2e2; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; font-weight: 500; text-align: left;">
                    <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
                </div>
            {% endif %}
            
            <form action="{{ url_for('pages.register') }}" method="POST">
                <div class="input-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>

                <div class="input-group">
                    <label for="class">Class / Major</label>
                    <input type="text" id="class" name="class" required placeholder="e.g., Software Engineering 2026">
                </div>

                <div class="input-group">
                    <label for="email">Student Email</label>
                    <input type="email" id="email" name="email" required placeholder="name@university.edu">
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Create a password">
                </div>
                
                <button type="submit" class="btn-signup">Sign Up</button>
            </form>
            
            <p class="switch-form">Already have an account? <a href="{{ url_for('pages.login') }}">Log In</a></p>
        </div>
    </div>

</body>
</html>
